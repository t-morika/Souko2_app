<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC機器在庫管理</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <div class="left-panel">
            <div class="product-panel">
                <div class="barcode-section">
                    <label for="barcode">バーコード入力:</label>
                    <input type="text" id="barcode" placeholder="バーコードを入力またはスキャン">
                    <button id="search-barcode">検索</button>
                </div>
                <div class="quick-section">
                    <label for="category-select">カテゴリ:</label>
                    <select id="category-select">
                        <option value="">すべて</option>
                        <option value="マウス">マウス</option>
                        <option value="セキュリティワイヤー">セキュリティワイヤー</option>
                        <option value="ノートPC">ノートPC</option>
                        <option value="一体型PC">一体型PC</option>
                        <option value="モニター">モニター</option>
                    </select>
                    <label for="product-select">製品:</label>
                    <select id="product-select">
                        <option value="">製品を選択</option>
                    </select>
                </div>
                <div class="quantity-section">
                    <label for="quantity">数量:</label>
                    <input type="number" id="quantity" min="1" value="1">
                </div>
                <div class="action-buttons">
                    <button id="stock-in">入庫</button>
                    <button id="stock-out">出庫</button>
                </div>
            </div>
        </div>
        <div class="right-panel">
            <div class="main-card">
                <h2>在庫一覧</h2>
                <table id="inventory-table">
                    <thead>
                        <tr>
                            <th>カテゴリ</th>
                            <th>メーカー</th>
                            <th>製品名</th>
                            <th>在庫数</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Inventory items will be populated here -->
                    </tbody>
                </table>
                <button id="print-inventory">印刷</button>
            </div>
        </div>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
