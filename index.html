<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PC機器在庫管理 - 機器一覧版</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/static/app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/app-icon.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <main class="main">
            <section class="list-section">
                <h2 class="section-title">機器一覧</h2>
                <div class="category-buttons" id="category-buttons">
                    <!-- カテゴリボタン -->
                </div>
                <div class="list-grid" id="device-list">
                    <!-- 製品カードがここに入ります -->
                </div>
            </section>

            <section class="product-section" id="product-section">
                <div class="barcode-input-container product-panel-barcode">
                    <label class="input-label">Barcode Input / Search</label>
                    <div class="input-group">
                        <input
                            type="text"
                            id="barcode"
                            placeholder="バーコードをスキャン または 検索..."
                            class="barcode-input"
                        />
                        <button id="search-barcode" class="search-btn">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="product-detail" id="product-detail">
                    <div class="placeholder">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        <p>製品を選択してください</p>
                        <p class="description">左側の機器一覧から、バーコードを使わずに製品を選択できます。</p>
                    </div>
                </div>
                <div class="execution-section">
                    <button id="stock-in" class="action-btn in-btn">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22,4 12,14.01 9,11.01"></polyline>
                        </svg>
                        <span>入庫確定 (IN)</span>
                    </button>
                    <button id="stock-out" class="action-btn out-btn">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="m15 9-6 6"></path>
                            <path d="m9 9 6 6"></path>
                        </svg>
                        <span>出庫確定 (OUT)</span>
                    </button>
                </div>
            </section>
        </main>
        <div class="notifications" id="notifications"></div>
        <footer class="footer">
            <span>System Version 1.0.0</span>
            <span>Warehouse: WH-JP-001</span>
        </footer>
    </div>
    <script src="/static/script.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js").catch(() => {});
            });
        }
    </script>
</body>
</html>
