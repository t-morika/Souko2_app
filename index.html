<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#0a0a0a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>PC機器在庫管理 - 機器一覧版</title>
    <link rel="manifest" href="/manifest.webmanifest">
    <link rel="icon" href="/static/app-icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/static/app-icon.svg">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="app">
        <main class="main">
            <section class="list-section">
                <div class="list-header-row">
                    <div class="list-tabs" role="tablist" aria-label="機器一覧切替タブ">
                        <button type="button" class="list-tab-btn active" data-list-tab="main" role="tab" aria-selected="true">機器一覧1</button>
                        <button type="button" class="list-tab-btn" data-list-tab="list1" role="tab" aria-selected="false">機器一覧2</button>
                        <button type="button" class="list-tab-btn" data-list-tab="list2" role="tab" aria-selected="false">機器一覧3</button>
                    </div>
                </div>

                <div id="list-pane-main" class="list-pane active" role="tabpanel">
                    <div class="category-selects">
                        <div class="select-block">
                            <label for="category-select" class="input-label">カテゴリー</label>
                            <select id="category-select" class="category-select"></select>
                        </div>
                        <div class="select-block">
                            <label for="maker-select" class="input-label">メーカー</label>
                            <select id="maker-select" class="maker-select"></select>
                        </div>
                    </div>
                    <div class="list-grid" id="device-list">
                        <!-- 製品カードがここに入ります -->
                    </div>
                </div>

                <div id="list-pane-1" class="list-pane" role="tabpanel" aria-hidden="true">
                    <div class="placeholder">
                        <p>機器一覧2 を表示中</p>
                        <p class="description">挙動確認用タブです。機能連動は次の実装で対応します。</p>
                    </div>
                </div>

                <div id="list-pane-2" class="list-pane" role="tabpanel" aria-hidden="true">
                    <div class="placeholder">
                        <p>機器一覧3 を表示中</p>
                        <p class="description">挙動確認用タブです。機能連動は次の実装で対応します。</p>
                    </div>
                </div>
            </section>

            <section class="product-section" id="product-section">
                <div class="barcode-input-container product-panel-barcode">
                    <label class="input-label">Barcode Input / Search</label>
                    <div class="input-group">
                        <input
                            type="text"
                            id="barcode"
                            placeholder="バーコードを読み取り　または　検索…"
                            class="barcode-input"
                        />
                        <button id="search-barcode" class="search-btn">
                            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                                <circle cx="11" cy="11" r="8"></circle>
                                <path d="m21 21-4.35-4.35"></path>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="product-detail" id="product-detail">
                    <div class="placeholder">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path>
                        </svg>
                        <p>製品を選択してください</p>
                        <p class="description">左側の機器一覧から、バーコードを使わずに製品を選択できます。</p>
                    </div>
                </div>
                <div class="execution-section">
                    <button id="stock-in" class="action-btn in-btn">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22,4 12,14.01 9,11.01"></polyline>
                        </svg>
                        <span>入庫確定 (IN)</span>
                    </button>
                    <button id="stock-out" class="action-btn out-btn">
                        <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                            <circle cx="12" cy="12" r="10"></circle>
                            <path d="m15 9-6 6"></path>
                            <path d="m9 9 6 6"></path>
                        </svg>
                        <span>出庫確定 (OUT)</span>
                    </button>
                    <button id="stock-dispose" class="action-btn dispose-btn compact-btn" title="廃棄">
                        <span>廃棄</span>
                    </button>
                </div>
            </section>
        </main>
        <div class="notifications" id="notifications"></div>
        <footer class="footer">
            <span>System Version 1.0.0</span>
            <span>Warehouse: WH-JP-001</span>
        </footer>
    </div>

    <div id="confirm-modal" class="confirm-modal" aria-hidden="true">
        <div class="confirm-modal-panel" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
            <h3 id="confirm-title">登録確認</h3>
            <p id="confirm-message" class="confirm-message">この内容で登録しますか？</p>
            <div class="confirm-actions">
                <button id="confirm-no" class="confirm-btn cancel-btn" type="button">いいえ</button>
                <button id="confirm-yes" class="confirm-btn ok-btn" type="button">はい</button>
            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
    <script>
        if ("serviceWorker" in navigator) {
            window.addEventListener("load", () => {
                navigator.serviceWorker.register("/sw.js").catch(() => {});
            });
        }
    </script>
</body>
</html>
